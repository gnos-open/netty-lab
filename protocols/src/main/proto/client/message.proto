syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.gnos.netty.lab.proto.client.message";
option java_outer_classname = "ClientMessage";
package message;

message TestReq_101 {
  string content = 1;
  int32 type = 2;
}

message TestResp_101 {
  string result = 1;
  int32 code = 2;
  string message = 3;
}